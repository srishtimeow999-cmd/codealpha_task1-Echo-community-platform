<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — Echo</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <h1 class="logo" aria-label="Echo"></h1>
      <ul class="nav-links" id="nav-links"></ul>
      <div class="sidebar-user" id="nav-user"></div>
    </aside>
    <div class="app-main">
      <header class="mobile-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
        <span class="logo logo-inline" aria-label="Echo"></span>
        <span></span>
      </header>

      <!-- Top Navigation Bar Component -->
      <nav class="top-nav-bar" id="top-nav-bar">
        <div class="top-nav-left">
          <button class="top-nav-item active" data-tab="feed">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Feed</span>
          </button>
          <button class="top-nav-item" data-tab="communities">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>My Community</span>
          </button>
          <button class="top-nav-item" data-tab="map">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 1.89.77 4 2.2 6.17L12 22l5.8-5.83C19.23 14 20 11.89 20 10a8 8 0 0 0-8-8z"/></svg>
            <span>Local Map</span>
          </button>
          <button class="top-nav-item" data-tab="events">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>Events</span>
          </button>
        </div>

        <div class="top-nav-right">
          <!-- Slide Switch theme toggle -->
          <div class="theme-toggle-wrap">
            <span class="theme-label-icon">☀️</span>
            <label class="switch-toggle" id="theme-switch-label">
              <input type="checkbox" id="theme-switch" checked>
              <span class="switch-slider"></span>
            </label>
            <span class="theme-label-icon">🌙</span>
          </div>

          <button class="top-nav-item profile-nav-item" data-tab="profile" id="top-nav-profile-btn">
            <div class="top-nav-avatar" id="top-nav-avatar">U</div>
            <span>Profile</span>
          </button>
        </div>
      </nav>

      <main class="main-content">
        <!-- PANEL 1: FEED TAB -->
        <div id="panel-feed" class="tab-panel">
          <section class="suggested-section">
            <h2 class="section-title">Suggested for you</h2>
            <p class="section-sub">People who share your interests</p>
            <div id="suggested-users" class="suggested-scroll"></div>
          </section>
          <section class="compose-box">
            <form id="compose-form">
              <textarea name="content" placeholder="What's on your mind?" maxlength="500"></textarea>
              <div class="compose-toolbar">
                <div class="compose-toolbar-actions">
                  <label class="compose-icon-btn" data-tooltip="Add image" aria-label="Add image">
                    <input type="file" id="post-image" name="image" accept="image/jpeg,image/png,image/gif,image/webp" hidden>
                    <svg class="compose-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <rect x="3" y="3" width="18" height="18" rx="2"/>
                      <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/>
                      <path d="M21 15l-5-5L5 21"/>
                    </svg>
                  </label>
                  <button type="button" class="compose-icon-btn" id="emoji-toggle" data-tooltip="Add emoji" aria-label="Add emoji" aria-expanded="false">
                    <svg class="compose-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <circle cx="12" cy="12" r="10"/>
                      <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                      <circle cx="9" cy="9" r="1" fill="currentColor" stroke="none"/>
                      <circle cx="15" cy="9" r="1" fill="currentColor" stroke="none"/>
                    </svg>
                  </button>
                </div>
                <div id="emoji-picker" class="emoji-picker hidden" role="listbox" aria-label="Face emojis"></div>
              </div>
              <div class="image-preview-wrap hidden" id="image-preview-wrap">
                <img id="image-preview" class="image-preview" alt="Preview">
                <button type="button" id="clear-image" class="compose-icon-btn image-preview-remove" data-tooltip="Remove image" aria-label="Remove image">×</button>
              </div>
              <button type="submit" class="btn btn-primary btn-post">Post</button>
            </form>
          </section>
          <h2 class="section-title">Discover posts</h2>
          <div id="home-feed"></div>
        </div>

        <!-- PANEL 2: COMMUNITIES TAB -->
        <div id="panel-communities" class="tab-panel hidden">
          <div class="split-layout">
            <div class="communities-left">
              <div class="community-search-box">
                <input type="text" id="community-search-input" placeholder="Search communities by name or category...">
                <button class="btn btn-primary btn-search" id="community-search-btn">Search</button>
              </div>
              <div class="category-filters-container" id="community-filters">
                <button class="filter-chip active" data-category="All">All</button>
                <button class="filter-chip" data-category="Small business">Small business</button>
                <button class="filter-chip" data-category="Educational">Educational</button>
                <button class="filter-chip" data-category="Protest and activism">Protest & activism</button>
                <button class="filter-chip" data-category="Donation drive">Donation drive</button>
                <button class="filter-chip" data-category="Shelter and volunteer">Shelter & volunteer</button>
                <button class="filter-chip" data-category="Environmental">Environmental</button>
              </div>
              <div id="communities-list"></div>
            </div>
            <div class="communities-right">
              <div class="sidebar-module">
                <h4 class="sidebar-module-title">Trending Communities</h4>
                <div id="trending-communities" class="mini-community-list"></div>
              </div>
              <div class="sidebar-module">
                <h4 class="sidebar-module-title">Discover More</h4>
                <div id="recommended-communities" class="mini-community-list"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- PANEL 3: LOCAL MAP TAB -->
        <div id="panel-map" class="tab-panel hidden">
          <div class="community-search-box">
            <input type="text" id="map-search-input" placeholder="Search cafes, bookstores, thrifts, local artists...">
            <button class="btn btn-primary btn-search" id="map-search-btn">Search</button>
          </div>
          <div class="category-filters-container" id="map-filters">
            <button class="filter-chip active" data-category="All">All Places</button>
            <button class="filter-chip" data-category="Cafe">Cafes</button>
            <button class="filter-chip" data-category="Bookstore">Bookstores</button>
            <button class="filter-chip" data-category="Thrift store">Thrift Stores</button>
            <button class="filter-chip" data-category="Artist/Creator">Artists & Creators</button>
            <button class="filter-chip" data-category="Local vendor">Local Vendors</button>
            <button class="filter-chip" id="underrated-filter-btn" data-underrated="true">💎 Underrated Gems</button>
          </div>
          <div class="map-grid">
            <div class="map-left-col">
              <div class="map-canvas-container" id="map-canvas">
                <div class="map-grid-overlay"></div>
                <div class="map-road map-road-h1"></div>
                <div class="map-road map-road-h2"></div>
                <div class="map-road map-road-v1"></div>
                <div class="map-road map-road-v2"></div>
                <div id="map-pins-container"></div>
              </div>
            </div>
            <div class="map-right-col">
              <div id="active-place-detail"></div>
              <h4 class="sidebar-module-title" style="margin-top: 1rem;">Nearby Directory</h4>
              <div id="places-list" class="places-list-container"></div>
            </div>
          </div>
        </div>

        <!-- PANEL 4: EVENTS TAB -->
        <div id="panel-events" class="tab-panel hidden">
          <div class="events-toolbar">
            <div class="category-filters-container" id="event-filters" style="margin-bottom: 0;">
              <button class="filter-chip active" data-category="All">All Events</button>
              <button class="filter-chip" data-category="Donation drive">Donations</button>
              <button class="filter-chip" data-category="Small concert">Concerts</button>
              <button class="filter-chip" data-category="Volunteer event">Volunteer</button>
              <button class="filter-chip" data-category="Community meetup">Meetups</button>
              <button class="filter-chip" data-category="Awareness campaign">Awareness</button>
            </div>
            <div style="display: flex;">
              <button class="layout-toggle-btn active" id="event-layout-toggle-list">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Grid
              </button>
              <button class="layout-toggle-btn" id="event-layout-toggle-calendar" style="margin-left: 0.5rem;">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Calendar
              </button>
            </div>
          </div>
          <div id="events-view-container">
            <div id="events-grid-layout" class="event-cards-grid"></div>
            <div id="events-calendar-layout" class="calendar-layout-view hidden">
              <h3 id="calendar-month-year" style="margin-bottom: 1rem; text-align: center;">May 2026</h3>
              <div class="calendar-grid" id="calendar-grid-cells"></div>
              <div id="calendar-selected-day-events" style="margin-top: 1.5rem;"></div>
            </div>
          </div>
        </div>

        <!-- PANEL 5: PROFILE TAB -->
        <div id="panel-profile" class="tab-panel hidden">
          <div id="dyn-profile-header"></div>
          <form id="dyn-edit-profile-form" class="edit-profile-form hidden">
            <h2 class="page-title">Edit profile</h2>
            <div class="form-group">
              <label for="dyn-displayName">Display name</label>
              <input type="text" id="dyn-displayName" name="displayName" maxlength="50">
            </div>
            <div class="form-group">
              <label for="dyn-bio">Bio</label>
              <textarea id="dyn-bio" name="bio" maxlength="160"></textarea>
            </div>
            <div class="form-group">
              <label for="dyn-avatar">Avatar URL</label>
              <input type="url" id="dyn-avatar" name="avatar" placeholder="https://…">
            </div>
            <button type="submit" class="btn btn-primary btn-sm">Save</button>
            <button type="button" class="btn btn-secondary btn-sm" id="dyn-cancel-edit">Cancel</button>
          </form>
          
          <div class="profile-sub-tabs" id="profile-sub-tabs">
            <button class="profile-sub-tab active" data-subtab="posts">My Posts</button>
            <button class="profile-sub-tab" data-subtab="saved">Saved Places</button>
            <button class="profile-sub-tab" data-subtab="communities">Memberships</button>
            <button class="profile-sub-tab" data-subtab="events">Joined Events</button>
            <button class="profile-sub-tab" data-subtab="comments">Comments</button>
            <button class="profile-sub-tab" data-subtab="activity">Activity Log</button>
          </div>
          
          <div id="dyn-profile-tab-content" class="profile-tab-content-panel"></div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/posts.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
