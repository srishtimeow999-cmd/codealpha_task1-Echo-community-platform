<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Echo</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page auth-page--login" data-page="login">
  <div class="auth-card">
    <h1 class="logo" aria-label="Echo"></h1>
    <p class="logo-sub">Build your circle</p>
    <div id="alert" class="alert alert-error hidden"></div>
    <form id="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Log in</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="/signup.html">Sign up</a></p>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
