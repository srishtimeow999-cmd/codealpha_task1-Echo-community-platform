<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Echo</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <h1 class="logo" aria-label="Echo"></h1>
      <ul class="nav-links" id="nav-links"></ul>
      <div class="sidebar-user" id="nav-user"></div>
    </aside>
    <div class="app-main">
      <header class="mobile-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
        <span class="logo logo-inline" aria-label="Echo"></span>
        <span></span>
      </header>
      <main class="main-content">
        <div id="profile-header"></div>
        <form id="edit-profile-form" class="edit-profile-form hidden">
          <h2 class="page-title">Edit profile</h2>
          <div class="form-group">
            <label for="displayName">Display name</label>
            <input type="text" id="displayName" name="displayName" maxlength="50">
          </div>
          <div class="form-group">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" maxlength="160"></textarea>
          </div>
          <div class="form-group">
            <label for="avatar">Avatar URL</label>
            <input type="url" id="avatar" name="avatar" placeholder="https://…">
          </div>
          <div class="form-group">
            <label>Interests</label>
            <div id="interest-picker" class="interest-picker"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Save</button>
          <button type="button" class="btn btn-secondary btn-sm" id="cancel-edit">Cancel</button>
        </form>
        <div id="profile-posts"></div>
      </main>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/posts.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
